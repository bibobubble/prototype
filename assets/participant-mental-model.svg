<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Participant mental model for the Boeing risk-alert prototype</title>
  <desc id="desc">A CFA-inspired conceptual relationship diagram linking observable dashboard inputs to latent participant mental states, measured indicators, and confounding variables.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#455468"/>
    </marker>
    <style>
      .title { font: 800 46px Inter, Arial, sans-serif; fill: #17202a; }
      .subtitle { font: 500 24px Inter, Arial, sans-serif; fill: #667085; }
      .label { font: 800 20px Inter, Arial, sans-serif; fill: #0f8f8c; text-transform: uppercase; }
      .box-title { font: 800 24px Inter, Arial, sans-serif; fill: #17202a; }
      .box-text { font: 500 18px Inter, Arial, sans-serif; fill: #667085; }
      .node-title { font: 800 22px Inter, Arial, sans-serif; fill: #17202a; text-anchor: middle; }
      .node-text { font: 500 16px Inter, Arial, sans-serif; fill: #667085; text-anchor: middle; }
      .small { font: 700 17px Inter, Arial, sans-serif; fill: #344054; }
      .line { stroke: #455468; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #b8c0cc; stroke-width: 2.5; fill: none; stroke-dasharray: 7 8; marker-end: url(#arrow); }
      .box { fill: #fff; stroke: #d8dee7; stroke-width: 2; rx: 16; }
      .input { fill: #f5fbfa; stroke: #9bd8d1; }
      .indicator { fill: #fbfcff; stroke: #c9d3ff; }
      .latent { fill: #fff7e8; stroke: #d9a446; stroke-width: 3; }
      .band { fill: #18212f; rx: 16; }
      .note { fill: #f7f8fa; stroke: #d8dee7; stroke-width: 2; rx: 16; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="#f7f8fa"/>
  <text x="80" y="82" class="title">Participant Mental Model</text>
  <text x="80" y="122" class="subtitle">What happens in the mind of participants during the risk-alert prototype test</text>

  <rect x="80" y="160" width="1440" height="92" class="band"/>
  <text x="110" y="198" class="label" fill="#9be0d8">Confounding variables</text>
  <text x="110" y="230" class="small" fill="#fff">Finance experience</text>
  <text x="385" y="230" class="small" fill="#fff">Boeing familiarity</text>
  <text x="650" y="230" class="small" fill="#fff">Numeracy</text>
  <text x="875" y="230" class="small" fill="#fff">Prior risk attitude</text>
  <text x="1195" y="230" class="small" fill="#fff">Time pressure</text>

  <text x="80" y="315" class="label">Observable dashboard inputs</text>
  <rect x="80" y="340" width="310" height="118" class="box input"/>
  <text x="235" y="386" class="node-title">Tone signal</text>
  <text x="235" y="416" class="node-text">disappointment / delight</text>
  <rect x="430" y="340" width="310" height="118" class="box input"/>
  <text x="585" y="386" class="node-title">Risk-term intensity</text>
  <text x="585" y="416" class="node-text">credit-risk language density</text>
  <rect x="780" y="340" width="310" height="118" class="box input"/>
  <text x="935" y="380" class="node-title">Market forecast</text>
  <text x="935" y="410" class="node-text">pre-call forecast +</text>
  <text x="935" y="434" class="node-text">historical context</text>
  <rect x="1130" y="340" width="310" height="118" class="box input"/>
  <text x="1285" y="386" class="node-title">Evidence framing</text>
  <text x="1285" y="416" class="node-text">tags + review trigger label</text>

  <path d="M235 458 V520" class="line"/>
  <path d="M585 458 V520" class="line"/>
  <path d="M935 458 V520" class="line"/>
  <path d="M1285 458 V520" class="line"/>

  <text x="80" y="560" class="label">Latent variables inside participant mind</text>
  <circle cx="235" cy="645" r="86" class="latent"/>
  <text x="235" y="628" class="node-title">Comprehension</text>
  <text x="235" y="660" class="node-text">understands the signal</text>
  <circle cx="585" cy="645" r="86" class="latent"/>
  <text x="585" y="618" class="node-title">Perceived risk</text>
  <text x="585" y="650" class="node-text">case feels more or less</text>
  <text x="585" y="674" class="node-text">urgent</text>
  <circle cx="935" cy="645" r="86" class="latent"/>
  <text x="935" y="618" class="node-title">Calibrated trust</text>
  <text x="935" y="650" class="node-text">trusts without</text>
  <text x="935" y="674" class="node-text">over-trusting</text>
  <circle cx="1285" cy="645" r="86" class="latent"/>
  <text x="1285" y="628" class="node-title">Action readiness</text>
  <text x="1285" y="660" class="node-text">prepared to act</text>

  <path d="M322 645 H498" class="line"/>
  <path d="M672 645 H848" class="line"/>
  <path d="M1022 645 H1198" class="line"/>

  <path d="M235 731 V785" class="line"/>
  <path d="M585 731 V785" class="line"/>
  <path d="M935 731 V785" class="line"/>
  <path d="M1285 731 V785" class="line"/>
  <path d="M260 252 C260 300 235 302 235 340" class="soft-line"/>
  <path d="M560 252 C560 300 585 302 585 340" class="soft-line"/>
  <path d="M910 252 C910 300 935 302 935 340" class="soft-line"/>
  <path d="M1250 252 C1250 300 1285 302 1285 340" class="soft-line"/>

  <text x="80" y="830" class="label">Measured indicators</text>
  <rect x="80" y="852" width="310" height="82" class="box indicator"/>
  <text x="235" y="902" class="node-title">Quiz accuracy</text>
  <rect x="430" y="852" width="310" height="82" class="box indicator"/>
  <text x="585" y="902" class="node-title">Risk / urgency rating</text>
  <rect x="780" y="852" width="310" height="82" class="box indicator"/>
  <text x="935" y="902" class="node-title">Trust + limitation awareness</text>
  <rect x="1130" y="852" width="310" height="82" class="box indicator"/>
  <text x="1285" y="902" class="node-title">Action + rationale</text>

  <rect x="80" y="940" width="1440" height="1" fill="#d8dee7"/>
</svg>
